services:
  lc0-api:
    build:
      context: .
      args:
        MAIA_DEFAULT_LEVEL: ${MAIA_DEFAULT_LEVEL:-1100}
    environment:
      PORT: 8787
      MAIA_DEFAULT_LEVEL: ${MAIA_DEFAULT_LEVEL:-1100}
      LC0_NODES: ${LC0_NODES:-1}
      LC0_TIMEOUT_MS: ${LC0_TIMEOUT_MS:-30000}
    ports:
      - "127.0.0.1:${PORT:-8787}:8787"
